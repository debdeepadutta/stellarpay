name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  contract-tests:
    name: Contract Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Soroban CLI
        run: cargo install --locked stellar-cli || true

      - name: Test & Build Contracts
        run: |
          for dir in contracts logger_contract vault_contract; do
            echo "Processing $dir..."
            cd $dir
            cargo test --verbose
            cargo build --target wasm32-unknown-unknown --release
            cd ..
          done

  frontend-tests:
    name: Frontend Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm run test
        env:
          CI: true

      - name: Build Project
        run: npm run build

  security-check:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: npm audit
        run: npm audit --audit-level=high || true

      - name: Check for exposed Firebase keys
        run: |
          # Check for common Firebase key patterns in source files
          # apiKey should not be in plaintext in src/
          if grep -rE "apiKey: \"AIza" src/ || grep -rE "projectId: \"clone-31d16" src/; then
            echo "❌ CRITICAL SECURITY ERROR: Exposed Firebase keys found in source code!"
            echo "Please move all secrets to environment variables."
            exit 1
          fi
          echo "✅ Security scan passed. No exposed secrets found."

  deploy:
    name: Production Deployment
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [contract-tests, frontend-tests, security-check]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Frontend
        run: |
          npm install
          npm run build

      - name: Deploy to Vercel
        run: |
          npm install --global vercel
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
