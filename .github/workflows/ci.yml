name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Build Tools
        run: sudo apt-get install -y python3 build-essential

      - name: Install Dependencies
        run: npm ci || npm install
        env:
          npm_config_build_from_source: true

      - name: Run Vitest
        run: npm test -- --reporter=verbose
        env:
          CI: true

      - name: Build Project
        run: npm run build

  contracts-ci:
    name: Contracts CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libssl-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test Donation Contract
        run: |
          cd contracts
          cargo test --verbose

      - name: Test Logger Contract
        run: |
          cd logger_contract
          cargo test --verbose
